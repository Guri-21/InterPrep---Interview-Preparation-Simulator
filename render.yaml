# Render Blueprint for the InterPrep backend.
# After connecting this repo on https://dashboard.render.com/blueprints, Render
# will read this file and provision the service automatically.
#
# The frontend is NOT deployed by this blueprint — that goes to Vercel
# (see vercel.json + README).
services:
  - type: web
    name: interprep-api
    env: node
    region: oregon          # change to a region near your users if you prefer
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render injects PORT automatically; this is just a default
      - key: BCRYPT_ROUNDS
        value: 10
      - key: JWT_EXPIRE
        value: 7d
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: ADMIN_NAME
        value: Platform Admin

      # ── Secrets that YOU set in the Render dashboard ───────────────
      # Each `sync: false` value will appear as a blank field — fill them in
      # under Render → your service → Environment.
      - key: MONGO_URI
        sync: false           # mongodb+srv://...mongodb.net/interprep?...
      - key: JWT_SECRET
        sync: false           # generate: openssl rand -hex 64
      - key: GEMINI_API_KEY
        sync: false           # get from https://aistudio.google.com/app/apikey
      - key: CLIENT_URL
        sync: false           # the Vercel frontend URL, comma-separated allowed
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false           # used once by `npm run seed:admin`
